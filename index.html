<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QTE Mobile</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>Quantum Trades Edge</h1>

</header>
<div class="hologram">
    <div class="orb"></div>
    <span>QTE</span>
</div>
<section class="card">

<h3>Account Balance</h3>

<h2 id="balance">$10,000</h2>

</section>

<section class="stats">

<div class="stat">
<h4>Win Rate</h4>
<p id="wr">78%</p>
</div>

<div class="stat">
<h4>P&L</h4>
<p id="pnl">+$542</p>
</div>

<div class="stat">
<h4>Avg RR</h4>
<p id="rr">1.8</p>
</div>

<div class="stat">
<h4>PF</h4>
<p id="pf">2.4</p>
</div>

</section>

<section class="card">

<h3>Equity Curve</h3>

<canvas id="equityChart"></canvas>

</section>

<section class="card">

<h3>Strategy Ranking</h3>

<div id="ranking"></div>

</section>

<section class="card">

<h3>Nuevo Trade</h3>

<input type="date" id="date">

<select id="strategy">

<option>Open Drive NY</option>

<option>ORB Momentum</option>

<option>Silver Bullet</option>

<option>FVG</option>

</select>

<select id="result">

<option>Win</option>

<option>Loss</option>

<option>BE</option>

</select>

<input type="number" id="rrInput" placeholder="RR">

<button onclick="saveTrade()">

Guardar Trade

</button>

</section>

<script src="app.js"></script>

</body>
</html>
