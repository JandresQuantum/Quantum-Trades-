<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orión QTE Mobile</title>
    <style>
        :root {
            --bg-color: #070a13;
            --panel-bg: #0b111e;
            --neon-magenta: #e026da;
            --neon-green: #39ff14;
            --neon-cyan: #00e5ff;
            --neon-blue: #0088ff;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Contenedor tipo App Móvil */
        .app-container {
            width: 100%;
            max-width: 412px; /* Optimizado para pantallas como el Galaxy A56 */
            height: 100vh;
            max-height: 846px;
            background: radial-gradient(circle at center, #0f172a 0%, #070a13 100%);
            border: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* Header */
        .app-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .app-header h1 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        /* Contenedor del Panel Circular */
        .dashboard-center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .svg-container {
            width: 100%;
            max-width: 340px;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.6));
        }

        /* Efectos Neón con Filtros SVG para Máximo Rendimiento */
        .neon-glow {
            filter: drop-shadow(0 0 6px var(--glow-color)) drop-shadow(0 0 12px var(--glow-color));
        }

        /* Estilos de los Textos en los Arcos */
        .arc-text {
            font-size: 10px;
            font-weight: bold;
            fill: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }

        /* Animación sutil para el núcleo central */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; filter: drop-shadow(0 0 15px var(--neon-cyan)); }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .center-core {
            transform-origin: 200px 200px;
            animation: pulse 4s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>QTE Mobile - Orión</h1>
        </header>

        <main class="dashboard-center">
            <div class="svg-container">
                <svg viewBox="0 0 400 400" width="100%" height="100%">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>

                        <path id="arc-top-left" d="M 78,140 A 135,135 0 0,1 170,68" fill="none" />
                        <path id="arc-top-right" d="M 230,68 A 135,135 0 0,1 322,140" fill="none" />
                        <path id="arc-bottom-right" d="M 322,260 A 135,135 0 0,1 230,332" fill="none" />
                        <path id="arc-bottom-left" d="M 170,332 A 135,135 0 0,1 78,260" fill="none" />
                    </defs>

                    <use href="#arc-top-left" stroke="rgba(224, 38, 218, 0.15)" stroke-width="32" stroke-linecap="round"/>
                    <use href="#arc-top-left" stroke="var(--neon-magenta)" stroke-width="28" stroke-linecap="round" class="neon-glow" style="--glow-color: var(--neon-magenta);" />

                    <use href="#arc-top-right" stroke="rgba(57, 255, 20, 0.15)" stroke-width="32" stroke-linecap="round"/>
                    <use href="#arc-top-right" stroke="var(--neon-green)" stroke-width="28" stroke-linecap="round" class="neon-glow" style="--glow-color: var(--neon-green);" />

                    <use href="#arc-bottom-right" stroke="rgba(0, 229, 255, 0.15)" stroke-width="32" stroke-linecap="round"/>
                    <use href="#arc-bottom-right" stroke="var(--neon-cyan)" stroke-width="28" stroke-linecap="round" class="neon-glow" style="--glow-color: var(--neon-cyan);" />

                    <use href="#arc-bottom-left" stroke="rgba(0, 136, 255, 0.15)" stroke-width="32" stroke-linecap="round"/>
                    <use href="#arc-bottom-left" stroke="var(--neon-blue)" stroke-width="28" stroke-linecap="round" class="neon-glow" style="--glow-color: var(--neon-blue);" />


                    <text class="arc-text" dy="4">
                        <textPath href="#arc-top-left" startOffset="50%" text-anchor="middle">NAS100 [Index] | 239.11</textPath>
                    </text>
                    <text class="arc-text" dy="4">
                        <textPath href="#arc-top-right" startOffset="50%" text-anchor="middle">PAC GLOBAL [Target]</textPath>
                    </text>
                    <text class="arc-text" dy="4">
                        <textPath href="#arc-bottom-right" startOffset="50%" text-anchor="middle">XAUUSD | $2,341.50</textPath>
                    </text>
                    <text class="arc-text" dy="4">
                        <textPath href="#arc-bottom-left" startOffset="50%" text-anchor="middle">US30 [WallStreet]</textPath>
                    </text>


                    <g class="center-core">
                        <circle cx="200" cy="200" r="75" fill="none" stroke="var(--neon-cyan)" stroke-width="2" opacity="0.4" />
                        <circle cx="200" cy="200" r="68" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="10 15 40 10" opacity="0.6" />
                        <circle cx="200" cy="200" r="58" fill="#0b111e" stroke="var(--neon-blue)" stroke-width="3" />

                        <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.85">
                            <circle cx="180" cy="160" r="3" fill="var(--neon-cyan)" /> <circle cx="222" cy="235" r="3" fill="#fff" /> <circle cx="218" cy="165" r="2.5" fill="#fff" /> <circle cx="183" cy="228" r="2.5" fill="#fff" /> <circle cx="195" cy="197" r="2" fill="var(--neon-cyan)" />
                            <circle cx="201" cy="198" r="2" fill="var(--neon-cyan)" />
                            <circle cx="207" cy="199" r="2" fill="var(--neon-cyan)" />
                            
                            <line x1="180" y1="160" x2="195" y2="197" />
                            <line x1="218" y1="165" x2="207" y2="199" />
                            <line x1="195" y1="197" x2="183" y2="228" />
                            <line x1="207" y1="199" x2="222" y2="235" />
                            <line x1="180" y1="160" x2="218" y2="165" stroke-dasharray="2 2" />
                            <line x1="183" y1="228" x2="222" y2="235" stroke-dasharray="2 2" stroke-width="1" />
                        </g>
                    </g>
                </svg>
            </div>
        </main>
    </div>

</body>
</html>
